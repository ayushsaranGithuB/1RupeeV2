name: Daily Wallet Deductions

on:
  schedule:
    # 00:00 IST = 18:30 UTC (previous day)
    - cron: '30 18 * * *'
  workflow_dispatch: {}

jobs:
  daily-deductions:
    name: Process Daily Donations
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Trigger daily donation processing
        env:
          CRON_ENDPOINT: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          http_status=$(curl -sS -o response.json -w '%{http_code}' -X POST \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -d '{}' \
            "$CRON_ENDPOINT/api/internal/cron/daily-run")

          echo "HTTP status: $http_status"
          cat response.json

          # Fail the step (and the run) on any non-2xx response, so GitHub
          # Actions' own failure notifications fire instead of the cron
          # failing silently behind a "green" curl exit code.
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "::error::Daily cron endpoint returned HTTP $http_status"
            exit 1
          fi
