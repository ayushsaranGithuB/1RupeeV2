# Fly config for the 1Rupee API (private service).
#
# Reachable by the web app over http://1rupee-api.internal:3001 via Fly private
# networking. Intentionally has no [http_service], so it is NOT exposed to the
# public internet. Deploy from the repo root: `fly deploy -c fly.api.toml`.
app = "1rupee-api"
primary_region = "bom"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  API_PORT = "3001"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
